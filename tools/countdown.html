<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>倒计时工具 - 在线工具集</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<script>(function(s){s.dataset.zone='10684071',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
<body>
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="logo">在线工具集</a>
      <nav class="nav">
        <a href="../index.html">首页</a>
      </nav>
    </div>
  </header>

  <main class="site-main container tool-page">
    <a href="../index.html" class="back">← 返回首页</a>
    <h1>倒计时工具</h1>
    <p class="lead">设置目标日期和事件名称，查看剩余时间。</p>

    <div class="tool-card">
      <h3>设置</h3>
      <div class="form-group">
        <label for="event-name">事件名称</label>
        <input type="text" id="event-name" value="新年" placeholder="例如：新年">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="target-date">目标日期</label>
          <input type="date" id="target-date">
        </div>
        <div class="form-group">
          <label for="target-time">目标时间</label>
          <input type="time" id="target-time" value="00:00">
        </div>
      </div>
      <button type="button" class="btn" id="btnStart">开始倒计时</button>
      <button type="button" class="btn btn-secondary" id="btnStop" style="margin-left: 0.5rem;" disabled>停止倒计时</button>
    </div>

    <div class="tool-card">
      <h3>倒计时</h3>
      <div class="countdown-display" id="countdown-display">
        <div class="countdown-item">
          <span class="countdown-number" id="days">00</span>
          <span class="countdown-label">天</span>
        </div>
        <div class="countdown-item">
          <span class="countdown-number" id="hours">00</span>
          <span class="countdown-label">时</span>
        </div>
        <div class="countdown-item">
          <span class="countdown-number" id="minutes">00</span>
          <span class="countdown-label">分</span>
        </div>
        <div class="countdown-item">
          <span class="countdown-number" id="seconds">00</span>
          <span class="countdown-label">秒</span>
        </div>
      </div>
      <p id="event-info" style="margin-top: 1rem; font-size: 1.1rem; text-align: center;"></p>
      <p id="msg" style="margin-top: 0.75rem; font-size: 0.9rem; color: var(--text-muted);"></p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>纯前端工具，数据仅在本机处理，不经过服务器。</p>
    </div>
  </footer>

  <script>
    (function () {
      var eventName = document.getElementById('event-name');
      var targetDate = document.getElementById('target-date');
      var targetTime = document.getElementById('target-time');
      var btnStart = document.getElementById('btnStart');
      var btnStop = document.getElementById('btnStop');
      var countdownDisplay = document.getElementById('countdown-display');
      var eventInfo = document.getElementById('event-info');
      var msg = document.getElementById('msg');
      var daysEl = document.getElementById('days');
      var hoursEl = document.getElementById('hours');
      var minutesEl = document.getElementById('minutes');
      var secondsEl = document.getElementById('seconds');

      var countdownInterval;

      // 设置默认目标日期为明天
      function setDefaultDate() {
        var tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        var year = tomorrow.getFullYear();
        var month = (tomorrow.getMonth() + 1).toString().padStart(2, '0');
        var day = tomorrow.getDate().toString().padStart(2, '0');
        targetDate.value = `${year}-${month}-${day}`;
      }

      // 开始倒计时
      function startCountdown() {
        var name = eventName.value || '事件';
        var date = targetDate.value;
        var time = targetTime.value || '00:00';

        if (!date) {
          msg.textContent = '请选择目标日期';
          return;
        }

        var targetDateTime = new Date(`${date} ${time}`);
        var now = new Date();

        if (targetDateTime <= now) {
          msg.textContent = '目标日期必须在当前时间之后';
          return;
        }

        eventInfo.textContent = `距离 ${name} 还有：`;
        msg.textContent = '';

        // 停止之前的倒计时
        if (countdownInterval) {
          clearInterval(countdownInterval);
        }

        // 开始新的倒计时
        updateCountdown(targetDateTime, name);
        countdownInterval = setInterval(function() {
          updateCountdown(targetDateTime, name);
        }, 1000);

        btnStart.disabled = true;
        btnStop.disabled = false;
      }

      // 停止倒计时
      function stopCountdown() {
        if (countdownInterval) {
          clearInterval(countdownInterval);
          countdownInterval = null;
        }

        btnStart.disabled = false;
        btnStop.disabled = true;
        msg.textContent = '倒计时已停止';
      }

      // 更新倒计时
      function updateCountdown(targetDateTime, eventName) {
        var now = new Date();
        var timeLeft = targetDateTime - now;

        if (timeLeft <= 0) {
          clearInterval(countdownInterval);
          countdownInterval = null;
          daysEl.textContent = '00';
          hoursEl.textContent = '00';
          minutesEl.textContent = '00';
          secondsEl.textContent = '00';
          eventInfo.textContent = `${eventName} 已经到来！`;
          msg.textContent = '倒计时已结束';
          btnStart.disabled = false;
          btnStop.disabled = true;
          return;
        }

        var days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
        var hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        var minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

        daysEl.textContent = days.toString().padStart(2, '0');
        hoursEl.textContent = hours.toString().padStart(2, '0');
        minutesEl.textContent = minutes.toString().padStart(2, '0');
        secondsEl.textContent = seconds.toString().padStart(2, '0');
      }

      // 事件监听
      btnStart.addEventListener('click', startCountdown);
      btnStop.addEventListener('click', stopCountdown);

      // 初始化
      setDefaultDate();
    })();

    // 记录工具使用历史
    function recordToolUsage(toolId) {
      const recentTools = JSON.parse(localStorage.getItem('recentTools') || '[]');
      // 移除已存在的工具，将新使用的工具添加到开头
      const updatedTools = recentTools.filter(id => id !== toolId);
      updatedTools.unshift(toolId);
      // 只保留最近5个使用的工具
      const limitedTools = updatedTools.slice(0, 5);
      localStorage.setItem('recentTools', JSON.stringify(limitedTools));
    }

    // 记录当前工具的使用
    recordToolUsage('countdown');
  </script>
</body>
</html>
