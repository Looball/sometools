<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>计算器 - 在线工具集</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .calculator {
      max-width: 400px;
      margin: 0 auto;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }
    .calculator-display {
      background-color: #f5f5f5;
      padding: 1rem;
      text-align: right;
    }
    .calculator-display input {
      width: 100%;
      border: none;
      background: none;
      font-size: 2rem;
      text-align: right;
      outline: none;
    }
    .calculator-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background-color: #ddd;
    }
    .calculator-button {
      padding: 1.5rem;
      border: none;
      background-color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .calculator-button:hover {
      background-color: #f0f0f0;
    }
    .calculator-button.operator {
      background-color: #f0f0f0;
    }
    .calculator-button.operator:hover {
      background-color: #e0e0e0;
    }
    .calculator-button.equals {
      background-color: #4CAF50;
      color: white;
      grid-row: span 4;
    }
    .calculator-button.equals:hover {
      background-color: #45a049;
    }
    .calculator-button.clear {
      background-color: #f44336;
      color: white;
    }
    .calculator-button.clear:hover {
      background-color: #da190b;
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="logo">在线工具集</a>
      <nav class="nav">
        <a href="../index.html">首页</a>
      </nav>
    </div>
  </header>

  <main class="site-main container tool-page">
    <a href="../index.html" class="back">← 返回首页</a>
    <h1>计算器</h1>
    <p class="lead">基本的算术计算器，支持加减乘除等运算。</p>

    <div class="tool-card">
      <div class="calculator">
        <div class="calculator-display">
          <input type="text" id="display" value="0" readonly>
        </div>
        <div class="calculator-buttons">
          <button class="calculator-button clear" data-value="clear">C</button>
          <button class="calculator-button" data-value="(">(</button>
          <button class="calculator-button" data-value=")">)</button>
          <button class="calculator-button operator" data-value="/">÷</button>
          <button class="calculator-button" data-value="7">7</button>
          <button class="calculator-button" data-value="8">8</button>
          <button class="calculator-button" data-value="9">9</button>
          <button class="calculator-button operator" data-value="*">×</button>
          <button class="calculator-button" data-value="4">4</button>
          <button class="calculator-button" data-value="5">5</button>
          <button class="calculator-button" data-value="6">6</button>
          <button class="calculator-button operator" data-value="-">-</button>
          <button class="calculator-button" data-value="1">1</button>
          <button class="calculator-button" data-value="2">2</button>
          <button class="calculator-button" data-value="3">3</button>
          <button class="calculator-button operator" data-value="+">+</button>
          <button class="calculator-button" data-value="0">0</button>
          <button class="calculator-button" data-value=".">.</button>
          <button class="calculator-button" data-value="backspace">←</button>
          <button class="calculator-button equals" data-value="=">=</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>纯前端工具，数据仅在本机处理，不经过服务器。</p>
    </div>
  </footer>

  <script>
    (function () {
      const display = document.getElementById('display');
      const buttons = document.querySelectorAll('.calculator-button');

      let currentValue = '0';
      let firstOperand = null;
      let operator = null;
      let waitingForSecondOperand = false;

      // 更新显示
      function updateDisplay() {
        display.value = currentValue;
      }

      // 处理数字输入
      function inputDigit(digit) {
        if (waitingForSecondOperand) {
          currentValue = digit;
          waitingForSecondOperand = false;
        } else {
          currentValue = currentValue === '0' ? digit : currentValue + digit;
        }
        updateDisplay();
      }

      // 处理小数点
      function inputDecimal() {
        if (!currentValue.includes('.')) {
          currentValue += '.';
          updateDisplay();
        }
      }

      // 处理运算符
      function handleOperator(nextOperator) {
        const inputValue = parseFloat(currentValue);

        if (firstOperand === null) {
          firstOperand = inputValue;
        } else if (operator) {
          const result = calculate(firstOperand, inputValue, operator);
          currentValue = String(result);
          firstOperand = result;
        }

        waitingForSecondOperand = true;
        operator = nextOperator;
      }

      // 计算结果
      function calculate(first, second, op) {
        switch (op) {
          case '+':
            return first + second;
          case '-':
            return first - second;
          case '*':
            return first * second;
          case '/':
            return first / second;
          default:
            return second;
        }
      }

      // 清空
      function clear() {
        currentValue = '0';
        firstOperand = null;
        operator = null;
        waitingForSecondOperand = false;
        updateDisplay();
      }

      // 退格
      function backspace() {
        if (currentValue.length > 1) {
          currentValue = currentValue.slice(0, -1);
        } else {
          currentValue = '0';
        }
        updateDisplay();
      }

      // 处理按钮点击
      buttons.forEach(button => {
        button.addEventListener('click', () => {
          const value = button.dataset.value;

          if (value >= '0' && value <= '9') {
            inputDigit(value);
          } else if (value === '.') {
            inputDecimal();
          } else if (value === 'clear') {
            clear();
          } else if (value === 'backspace') {
            backspace();
          } else if (value === '=') {
            if (operator) {
              handleOperator('=');
              operator = null;
            }
          } else {
            handleOperator(value);
          }
        });
      });

      // 键盘支持
      document.addEventListener('keydown', (e) => {
        const key = e.key;

        if (key >= '0' && key <= '9') {
          inputDigit(key);
        } else if (key === '.') {
          inputDecimal();
        } else if (key === '+' || key === '-' || key === '*' || key === '/') {
          handleOperator(key);
        } else if (key === 'Enter' || key === '=') {
          if (operator) {
            handleOperator('=');
            operator = null;
          }
        } else if (key === 'Escape') {
          clear();
        } else if (key === 'Backspace') {
          backspace();
        }
      });
    })();

    // 记录工具使用历史
    function recordToolUsage(toolId) {
      const recentTools = JSON.parse(localStorage.getItem('recentTools') || '[]');
      // 移除已存在的工具，将新使用的工具添加到开头
      const updatedTools = recentTools.filter(id => id !== toolId);
      updatedTools.unshift(toolId);
      // 只保留最近5个使用的工具
      const limitedTools = updatedTools.slice(0, 5);
      localStorage.setItem('recentTools', JSON.stringify(limitedTools));
    }

    // 记录当前工具的使用
    recordToolUsage('calculator');
  </script>
</body>
</html>
