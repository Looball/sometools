<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>图片滤镜 - 在线工具集</title>
  <link rel="stylesheet" href="../css/common.css">
</head>

<body>
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="logo">在线工具集</a>
      <nav class="nav">
        <a href="../index.html">首页</a>
      </nav>
    </div>
  </header>

  <main class="site-main container tool-page">
    <a href="../index.html" class="back">← 返回首页</a>
    <h1>图片滤镜</h1>
    <p class="lead">上传图片后应用各种滤镜效果，并下载结果。</p>

    <div class="tool-card">
      <h3>选择图片</h3>
      <div class="form-group">
        <input type="file" id="file" accept="image/*">
      </div>
      <div class="form-group">
        <label for="filter">滤镜效果</label>
        <select id="filter">
          <option value="none">原图</option>
          <option value="grayscale">黑白</option>
          <option value="sepia">复古</option>
          <option value="blur">模糊</option>
          <option value="brightness">亮度</option>
          <option value="contrast">对比度</option>
          <option value="saturation">饱和度</option>
          <option value="invert">反色</option>
          <option value="hue-rotate">色相旋转</option>
        </select>
      </div>
      <div class="form-group" id="filterValueContainer" style="display: none;">
        <label for="filterValue">滤镜强度</label>
        <input type="range" id="filterValue" min="0" max="2" step="0.1" value="1">
        <span id="filterValueDisplay">1.0</span>
      </div>
      <div class="form-group">
        <label for="format">输出格式</label>
        <select id="format">
          <option value="image/png">PNG</option>
          <option value="image/jpeg">JPEG</option>
          <option value="image/webp">WebP</option>
        </select>
      </div>
      <button type="button" class="btn" id="btnApply" disabled>应用滤镜并下载</button>
    </div>

    <div class="tool-card">
      <h3>预览</h3>
      <div class="preview-box" id="preview">
        <span class="preview-placeholder">请选择一张图片</span>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>纯前端工具，数据仅在本机处理，不经过服务器。</p>
    </div>
  </footer>

  <script>
    (function () {
      const fileEl = document.getElementById('file');
      const filterEl = document.getElementById('filter');
      const filterValueContainer = document.getElementById('filterValueContainer');
      const filterValueEl = document.getElementById('filterValue');
      const filterValueDisplay = document.getElementById('filterValueDisplay');
      const formatEl = document.getElementById('format');
      const btnApply = document.getElementById('btnApply');
      const preview = document.getElementById('preview');

      let currentImage = null;
      let currentFileName = '';

      // 处理文件上传
      fileEl.addEventListener('change', function () {
        const file = fileEl.files[0];
        if (!file || !file.type.startsWith('image/')) {
          preview.innerHTML = '<span class="preview-placeholder">请选择一张图片</span>';
          btnApply.disabled = true;
          return;
        }

        currentFileName = file.name.replace(/\.[^.]+$/, '');
        const url = URL.createObjectURL(file);
        const img = new Image();

        img.onload = function () {
          preview.innerHTML = `<img id="filterImage" src="${url}" alt="滤镜预览">`;
          currentImage = document.getElementById('filterImage');
          applyFilter();
          btnApply.disabled = false;
        };

        img.src = url;
      });

      // 滤镜选择变化
      filterEl.addEventListener('change', function () {
        const filter = this.value;
        filterValueContainer.style.display = (filter === 'brightness' || filter === 'contrast' || filter === 'saturation' || filter === 'blur' || filter === 'hue-rotate') ? 'block' : 'none';
        applyFilter();
      });

      // 滤镜强度变化
      filterValueEl.addEventListener('input', function () {
        filterValueDisplay.textContent = this.value;
        applyFilter();
      });

      // 应用滤镜
      function applyFilter() {
        if (!currentImage) return;

        const filter = filterEl.value;
        const value = filterValueEl.value;
        let filterCSS = 'none';

        switch (filter) {
          case 'grayscale':
            filterCSS = 'grayscale(100%)';
            break;
          case 'sepia':
            filterCSS = 'sepia(100%)';
            break;
          case 'blur':
            filterCSS = `blur(${value * 5}px)`;
            break;
          case 'brightness':
            filterCSS = `brightness(${value})`;
            break;
          case 'contrast':
            filterCSS = `contrast(${value * 100}%)`;
            break;
          case 'saturation':
            filterCSS = `saturate(${value * 100}%)`;
            break;
          case 'invert':
            filterCSS = 'invert(100%)';
            break;
          case 'hue-rotate':
            filterCSS = `hue-rotate(${value * 360}deg)`;
            break;
        }

        currentImage.style.filter = filterCSS;
      }

      // 应用滤镜并下载
      btnApply.addEventListener('click', function () {
        if (!currentImage) return;

        const canvas = document.createElement('canvas');
        canvas.width = currentImage.naturalWidth;
        canvas.height = currentImage.naturalHeight;
        const ctx = canvas.getContext('2d');

        // 应用滤镜到画布
        ctx.filter = currentImage.style.filter;
        ctx.drawImage(currentImage, 0, 0);

        const mime = formatEl.value;
        const ext = mime === 'image/jpeg' ? 'jpg' : mime === 'image/webp' ? 'webp' : 'png';

        canvas.toBlob(function (blob) {
          if (!blob) return;
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.download = currentFileName + '-filtered.' + ext;
          a.href = url;
          a.click();
          URL.revokeObjectURL(url);
        }, mime, 0.92);
      });
    })();

    // 记录工具使用历史
    function recordToolUsage(toolId) {
      const recentTools = JSON.parse(localStorage.getItem('recentTools') || '[]');
      // 移除已存在的工具，将新使用的工具添加到开头
      const updatedTools = recentTools.filter(id => id !== toolId);
      updatedTools.unshift(toolId);
      // 只保留最近5个使用的工具
      const limitedTools = updatedTools.slice(0, 5);
      localStorage.setItem('recentTools', JSON.stringify(limitedTools));
    }

    // 记录当前工具的使用
    recordToolUsage('image-filter');
  </script>
</body>
</html>
