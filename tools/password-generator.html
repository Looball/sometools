<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>密码生成器 - 在线工具集</title>
  <link rel="stylesheet" href="../css/common.css">
</head>

<body>
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="logo">在线工具集</a>
      <nav class="nav">
        <a href="../index.html">首页</a>
      </nav>
    </div>
  </header>

  <main class="site-main container tool-page">
    <a href="../index.html" class="back">← 返回首页</a>
    <h1>密码生成器</h1>
    <p class="lead">生成安全、随机的密码，可自定义长度和字符类型。</p>

    <div class="tool-card">
      <h3>设置</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="password-length">密码长度</label>
          <input type="number" id="password-length" value="12" min="8" max="100">
        </div>
        <div class="form-group">
          <label for="password-count">生成数量</label>
          <input type="number" id="password-count" value="5" min="1" max="50">
        </div>
      </div>
      <div class="form-group">
        <label>包含字符类型</label>
        <div class="checkbox-group">
          <label><input type="checkbox" id="include-uppercase" checked> 大写字母 (A-Z)</label>
          <label><input type="checkbox" id="include-lowercase" checked> 小写字母 (a-z)</label>
          <label><input type="checkbox" id="include-numbers" checked> 数字 (0-9)</label>
          <label><input type="checkbox" id="include-symbols" checked> 特殊字符 (!@#$%^&*)</label>
        </div>
      </div>
      <button type="button" class="btn" id="btnGenerate">生成密码</button>
    </div>

    <div class="tool-card">
      <h3>生成的密码</h3>
      <div class="password-list" id="password-list">
        <!-- 生成的密码将显示在这里 -->
      </div>
      <button type="button" class="btn" id="btnCopyAll">复制所有密码</button>
      <p id="msg" style="margin-top: 0.75rem; font-size: 0.9rem; color: var(--text-muted);"></p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>纯前端工具，数据仅在本机处理，不经过服务器。</p>
    </div>
  </footer>

  <script>
    (function () {
      var passwordLength = document.getElementById('password-length');
      var passwordCount = document.getElementById('password-count');
      var includeUppercase = document.getElementById('include-uppercase');
      var includeLowercase = document.getElementById('include-lowercase');
      var includeNumbers = document.getElementById('include-numbers');
      var includeSymbols = document.getElementById('include-symbols');
      var passwordList = document.getElementById('password-list');
      var msg = document.getElementById('msg');
      var btnGenerate = document.getElementById('btnGenerate');
      var btnCopyAll = document.getElementById('btnCopyAll');

      // 字符集
      var charSets = {
        uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lowercase: 'abcdefghijklmnopqrstuvwxyz',
        numbers: '0123456789',
        symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
      };

      // 生成密码
      function generatePassword(length, charSet) {
        var password = '';
        for (var i = 0; i < length; i++) {
          var randomIndex = Math.floor(Math.random() * charSet.length);
          password += charSet[randomIndex];
        }
        return password;
      }

      // 生成密码列表
      function generatePasswords() {
        var length = parseInt(passwordLength.value) || 12;
        var count = parseInt(passwordCount.value) || 5;
        var selectedCharSets = '';

        if (includeUppercase.checked) selectedCharSets += charSets.uppercase;
        if (includeLowercase.checked) selectedCharSets += charSets.lowercase;
        if (includeNumbers.checked) selectedCharSets += charSets.numbers;
        if (includeSymbols.checked) selectedCharSets += charSets.symbols;

        if (selectedCharSets.length === 0) {
          msg.textContent = '请至少选择一种字符类型';
          return;
        }

        passwordList.innerHTML = '';
        var passwords = [];

        for (var i = 0; i < count; i++) {
          var password = generatePassword(length, selectedCharSets);
          passwords.push(password);

          var passwordItem = document.createElement('div');
          passwordItem.className = 'password-item';
          passwordItem.innerHTML = `
            <span class="password-text">${password}</span>
            <button class="btn btn-secondary copy-btn" data-password="${password}">复制</button>
          `;
          passwordList.appendChild(passwordItem);
        }

        // 绑定复制按钮事件
        var copyBtns = passwordList.querySelectorAll('.copy-btn');
        copyBtns.forEach(btn => {
          btn.addEventListener('click', function() {
            var password = this.dataset.password;
            copyToClipboard(password);
          });
        });

        msg.textContent = `已生成 ${count} 个密码`;
      }

      // 复制到剪贴板
      async function copyToClipboard(text) {
        try {
          await navigator.clipboard.writeText(text);
          msg.textContent = '已复制到剪贴板';
        } catch (e) {
          var textArea = document.createElement('textarea');
          textArea.value = text;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
          msg.textContent = '已复制到剪贴板';
        }
      }

      // 复制所有密码
      function copyAllPasswords() {
        var passwordTexts = passwordList.querySelectorAll('.password-text');
        var passwords = Array.from(passwordTexts).map(item => item.textContent).join('\n');
        if (passwords) {
          copyToClipboard(passwords);
        }
      }

      // 事件监听
      btnGenerate.addEventListener('click', generatePasswords);
      btnCopyAll.addEventListener('click', copyAllPasswords);

      // 初始化生成
      generatePasswords();
    })();

    // 记录工具使用历史
    function recordToolUsage(toolId) {
      const recentTools = JSON.parse(localStorage.getItem('recentTools') || '[]');
      // 移除已存在的工具，将新使用的工具添加到开头
      const updatedTools = recentTools.filter(id => id !== toolId);
      updatedTools.unshift(toolId);
      // 只保留最近5个使用的工具
      const limitedTools = updatedTools.slice(0, 5);
      localStorage.setItem('recentTools', JSON.stringify(limitedTools));
    }

    // 记录当前工具的使用
    recordToolUsage('password-generator');
  </script>
</body>
</html>
