<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IP查询 - 在线工具集</title>
  <link rel="stylesheet" href="../css/common.css">
</head>

<body>
  <header class="site-header">
    <div class="container">
      <a href="../index.html" class="logo">在线工具集</a>
      <nav class="nav">
        <a href="../index.html">首页</a>
      </nav>
    </div>
  </header>

  <main class="site-main container tool-page">
    <a href="../index.html" class="back">← 返回首页</a>
    <h1>IP查询</h1>
    <p class="lead">查询IP地址的地理位置和详细信息。</p>

    <div class="tool-card">
      <h3>IP地址查询</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="ipAddress">IP地址</label>
          <input type="text" id="ipAddress" placeholder="输入IP地址，例如：8.8.8.8">
        </div>
        <button type="button" class="btn" id="queryBtn">查询</button>
        <button type="button" class="btn btn-secondary" id="getMyIpBtn">查询本机IP</button>
      </div>

      <div id="ipInfo" class="form-group" style="margin-top: 1rem; display: none;">
        <h4>IP信息</h4>
        <div class="ip-info-container"></div>
      </div>

      <div id="errorMsg" class="form-group" style="margin-top: 1rem; display: none;">
        <p class="error-message"></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>纯前端工具，数据仅在本机处理，不经过服务器。</p>
    </div>
  </footer>

  <script>
    (function () {
      const ipAddress = document.getElementById('ipAddress');
      const queryBtn = document.getElementById('queryBtn');
      const getMyIpBtn = document.getElementById('getMyIpBtn');
      const ipInfo = document.getElementById('ipInfo');
      const ipInfoContainer = ipInfo.querySelector('.ip-info-container');
      const errorMsg = document.getElementById('errorMsg');
      const errorMessage = errorMsg.querySelector('.error-message');

      // 查询IP信息
      async function queryIpInfo(ip) {
        try {
          const response = await fetch(`https://ipapi.co/${ip}/json/`);
          if (!response.ok) {
            throw new Error('查询失败');
          }
          const data = await response.json();
          displayIpInfo(data);
        } catch (error) {
          displayError('查询失败，请检查网络连接或IP地址格式');
        }
      }

      // 获取本机IP
      async function getMyIp() {
        try {
          const response = await fetch('https://api.ipify.org?format=json');
          if (!response.ok) {
            throw new Error('获取IP失败');
          }
          const data = await response.json();
          ipAddress.value = data.ip;
          queryIpInfo(data.ip);
        } catch (error) {
          displayError('获取本机IP失败，请检查网络连接');
        }
      }

      // 显示IP信息
      function displayIpInfo(data) {
        ipInfo.style.display = 'block';
        errorMsg.style.display = 'none';

        const infoHTML = `
          <div class="info-item">
            <strong>IP地址:</strong> ${data.ip || 'N/A'}
          </div>
          <div class="info-item">
            <strong>城市:</strong> ${data.city || 'N/A'}
          </div>
          <div class="info-item">
            <strong>地区:</strong> ${data.region || 'N/A'}
          </div>
          <div class="info-item">
            <strong>国家:</strong> ${data.country_name || 'N/A'} (${data.country_code || 'N/A'})
          </div>
          <div class="info-item">
            <strong>邮政编码:</strong> ${data.postal || 'N/A'}
          </div>
          <div class="info-item">
            <strong>纬度:</strong> ${data.latitude || 'N/A'}
          </div>
          <div class="info-item">
            <strong>经度:</strong> ${data.longitude || 'N/A'}
          </div>
          <div class="info-item">
            <strong>时区:</strong> ${data.timezone || 'N/A'}
          </div>
          <div class="info-item">
            <strong>ISP:</strong> ${data.org || 'N/A'}
          </div>
        `;

        ipInfoContainer.innerHTML = infoHTML;
      }

      // 显示错误信息
      function displayError(message) {
        errorMsg.style.display = 'block';
        ipInfo.style.display = 'none';
        errorMessage.textContent = message;
      }

      // 事件监听
      queryBtn.addEventListener('click', function() {
        const ip = ipAddress.value.trim();
        if (!ip) {
          displayError('请输入IP地址');
          return;
        }
        queryIpInfo(ip);
      });

      getMyIpBtn.addEventListener('click', getMyIp);

      // 回车键查询
      ipAddress.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          queryBtn.click();
        }
      });
    })();

    // 记录工具使用历史
    function recordToolUsage(toolId) {
      const recentTools = JSON.parse(localStorage.getItem('recentTools') || '[]');
      // 移除已存在的工具，将新使用的工具添加到开头
      const updatedTools = recentTools.filter(id => id !== toolId);
      updatedTools.unshift(toolId);
      // 只保留最近5个使用的工具
      const limitedTools = updatedTools.slice(0, 5);
      localStorage.setItem('recentTools', JSON.stringify(limitedTools));
    }

    // 记录当前工具的使用
    recordToolUsage('ip-query');
  </script>
</body>
</html>
